name: Build Executables

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executables
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean vortex.spec

      - name: Upload Windows GUI Executable
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Windows-GUI
          path: dist/Vortex.exe
          if-no-files-found: error

      - name: Upload Windows CLI Executable
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Windows-CLI
          path: dist/Vortex-CLI.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux Executables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean vortex.spec

      - name: Upload Linux GUI Executable
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Linux-GUI
          path: dist/Vortex
          if-no-files-found: error

      - name: Upload Linux CLI Executable
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Linux-CLI
          path: dist/Vortex-CLI
          if-no-files-found: error
